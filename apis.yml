aid: object-oriented-programming
name: Object-Oriented Programming
description: >-
  Object-Oriented Programming (OOP) is a software development paradigm that
  organizes software design around data, or objects, rather than functions and
  logic. OOP uses concepts like classes, inheritance, encapsulation, and
  polymorphism to enable modular, reusable code design.
